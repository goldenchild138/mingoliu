<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ming Liu — Digital. Creative.</title>
<meta name="description" content="Ming Liu. Principal product designer. Portfolio coming soon." />

<!-- Barlow font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          barlow: ['Barlow', 'sans-serif'],
        },
        colors: {
          paper: '#F1F1EF',
          ink: '#111111',
        },
      },
    },
  };
</script>

<style>
  html { font-family: 'Barlow', sans-serif; }
  body { background-color: #F1F1EF; }
  .underline-link {
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(17,17,17,0.35);
    transition: text-decoration-color 0.2s ease;
  }
  .underline-link:hover {
    text-decoration-color: rgba(17,17,17,1);
  }
</style>
</head>

<body class="min-h-screen flex flex-col text-ink font-barlow">

  <!-- Top bar -->
  <header class="w-full px-6 md:px-10 py-6 flex items-center justify-between" style="font-size: 11pt;">
    <span class="tracking-wide">Index /</span>

    <div class="max-w-3xl">

        class="underline-link font-medium"
        style="font-size: 11pt;"

        LinkedIn ↗
      </a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full px-6 md:px-10 py-6 flex items-center justify-between border-t border-ink/10 mt-10" style="font-size: 11pt;">
    <span>© Ming Liu</span>
    <span class="text-ink/50">Site coming soon</span>
